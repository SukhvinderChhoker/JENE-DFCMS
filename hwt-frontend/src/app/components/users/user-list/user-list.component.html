<div class="user-list-page">
  <div class="page-header">
    <h1>Users</h1>
    <a routerLink="/users/new" class="btn-primary">
      <span class="material-icons">person_add</span> New User
    </a>
  </div>

  <div class="table-container">
    <table class="data-table" *ngIf="users.length > 0">
      <thead>
        <tr>
          <th>Name</th>
          <th>Username</th>
          <th>Email</th>
          <th>Roles</th>
          <th>Status</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of users">
          <td class="name-cell">
            <div class="avatar">{{ user.forename[0] }}{{ user.surname[0] }}</div>
            <div>
              <strong>{{ user.forename }} {{ user.surname }}</strong>
              <span class="job-title" *ngIf="user.jobTitle">{{ user.jobTitle }}</span>
            </div>
          </td>
          <td>{{ user.username }}</td>
          <td>{{ user.email }}</td>
          <td>
            <span class="role-badge" *ngFor="let role of user.roles" [ngClass]="getRoleBadgeClass(role)">
              {{ role }}
            </span>
          </td>
          <td>
            <span class="status-indicator" [class.active]="user.active" [class.inactive]="!user.active">
              {{ user.active ? 'Active' : 'Inactive' }}
            </span>
          </td>
          <td>
            <a [routerLink]="['/users', user.id, 'edit']" class="edit-btn">
              <span class="material-icons">edit</span>
            </a>
          </td>
        </tr>
      </tbody>
    </table>
    <div class="empty-state" *ngIf="users.length === 0 && !loading">
      <span class="material-icons">people</span>
      <p>No users found</p>
    </div>
  </div>
</div>

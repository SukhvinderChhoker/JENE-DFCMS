<div class="task-form-page">
  <div class="page-header">
    <a [routerLink]="['/cases', caseId]" class="back-link">
      <span class="material-icons">arrow_back</span> Back to Case
    </a>
    <h1>{{ isEdit ? 'Edit Task' : 'New Task' }}</h1>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="form-card">
    <div class="form-grid">
      <div class="form-group full-width">
        <label for="taskName">Task Name *</label>
        <input type="text" id="taskName" formControlName="taskName" placeholder="Enter task name">
        <div class="error" *ngIf="form.get('taskName')?.touched && form.get('taskName')?.invalid">
          Task name is required
        </div>
      </div>

      <div class="form-group">
        <label for="taskType">Task Type *</label>
        <select id="taskType" formControlName="taskType">
          <option *ngFor="let t of taskTypes" [value]="t">{{ t }}</option>
        </select>
      </div>

      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" formControlName="location" placeholder="Enter location">
      </div>

      <div class="form-group">
        <label for="deadline">Deadline</label>
        <input type="datetime-local" id="deadline" formControlName="deadline">
      </div>

      <div class="form-group full-width">
        <label for="background">Background</label>
        <textarea id="background" formControlName="background" rows="4" placeholder="Enter task details..."></textarea>
      </div>
    </div>

    <div class="form-actions">
      <a [routerLink]="['/cases', caseId]" class="btn-secondary">Cancel</a>
      <button type="submit" class="btn-primary" [disabled]="submitting">
        {{ submitting ? 'Saving...' : (isEdit ? 'Update Task' : 'Create Task') }}
      </button>
    </div>
  </form>
</div>

<div class="login-page">
  <div class="login-container">
    <div class="login-header">
      <div class="logo-wrapper">
        <img src="assets/logo.svg" alt="Raksha Cyber Agency" class="agency-logo">
      </div>
      <h1>JENE-DFCMS</h1>
      <p>Digital Forensic Case Management System</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <span class="material-icons">person</span>
          <input type="text" id="username" [(ngModel)]="username" name="username" placeholder="Enter your username" required>
        </div>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <span class="material-icons">lock</span>
          <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="Enter your password" required>
        </div>
      </div>
      <div class="role-selector">
        <label for="role">Login as Role</label>
        <select id="role" [(ngModel)]="selectedRole" name="role" required>
          <option value="">Select your role...</option>
          <option value="ADMIN">Admin</option>
          <option value="CASE_MANAGER">Case Manager</option>
          <option value="INVESTIGATOR">Investigator</option>
          <option value="QA">Quality Assurance (QA)</option>
          <option value="REQUESTER">Requester</option>
          <option value="AUTHORISER">Authoriser</option>
        </select>
      </div>
      <div class="error-message" *ngIf="errorMessage">
        <span class="material-icons">error</span> {{ errorMessage }}
      </div>
      <button type="submit" class="login-btn" [disabled]="loading">
        <span *ngIf="loading" class="spinner"></span>
        <span *ngIf="!loading">Sign In</span>
      </button>
    </form>
  </div>
</div>

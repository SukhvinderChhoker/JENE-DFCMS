version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jene-secured-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jene_dfcms}
      POSTGRES_USER: ${DB_USERNAME:-jene_dfcms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jene_dfcms} -d ${DB_NAME:-jene_dfcms}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - jene-network
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: ./hwt-backend
      dockerfile: Dockerfile.prod
    container_name: jene-secured-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-jene_dfcms}
      DB_USERNAME: ${DB_USERNAME:-jene_dfcms}
      DB_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      LICENSE_FILE: ${LICENSE_FILE:-license/jene-dfcms.license}
      LICENSE_REQUIRED: ${LICENSE_REQUIRED:-true}
      SERVER_PORT: 8080
      JAVA_OPTS: >-
        -XX:+UseContainerSupport
        -XX:MaxRAMPercentage=75.0
        -XX:InitialRAMPercentage=50.0
        -Djava.security.egd=file:/dev/./urandom
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads
      - license_data:/app/license
    networks:
      - jene-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/auth/login -o /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  frontend:
    build:
      context: ./hwt-frontend
      dockerfile: Dockerfile.prod
    container_name: jene-secured-web
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
    networks:
      - jene-network
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp

networks:
  jene-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  uploads_data:
    driver: local
  license_data:
    driver: local

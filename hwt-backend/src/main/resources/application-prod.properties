# ============================================
# JENE-DFCMS Production Configuration
# ============================================

server.port=${SERVER_PORT:8080}

# PostgreSQL Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:jene_dfcms}
spring.datasource.username=${DB_USERNAME:jene_dfcms}
spring.datasource.password=${DB_PASSWORD:changeme123}
spring.datasource.driverClassName=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# JWT
jwt.secret=${JWT_SECRET:production-secret-key-change-me-minimum-32-chars}
jwt.expiration=${JWT_EXPIRATION:3600000}

# File Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Mail (optional)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

# Logging
logging.level.com.foreman=${LOG_LEVEL:INFO}
logging.level.org.springframework.security=WARN

spring.jackson.serialization.fail-on-empty-beans=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

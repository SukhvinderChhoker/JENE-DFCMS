version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: jene-dfcms-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-jene_dfcms}
      POSTGRES_USER: ${DB_USERNAME:-jene_dfcms}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
    ports:
      - "${DB_PORT_EXTERNAL:5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-jene_dfcms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./hwt-backend
      dockerfile: Dockerfile
    container_name: jene-dfcms-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-jene_dfcms}
      DB_USERNAME: ${DB_USERNAME:-jene_dfcms}
      DB_PASSWORD: ${DB_PASSWORD:-changeme123}
      JWT_SECRET: ${JWT_SECRET:-production-secret-key-change-me-minimum-32-chars}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600000}
      SERVER_PORT: 8080
    ports:
      - "${BACKEND_PORT:8080}:8080"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./hwt-frontend
      dockerfile: Dockerfile
    container_name: jene-dfcms-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:80}:80"

volumes:
  postgres_data:
  uploads_data:
